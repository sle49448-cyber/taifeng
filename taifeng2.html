<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人物介绍合集</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Microsoft YaHei", sans-serif;
    }
    body {
        background: #ffffff;
        padding: 40px 20px;
        max-width: 600px;
        margin: 0 auto;
    }
    .page-title {
        font-size: 28px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 40px;
        color: #222;
    }
    .person-card {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 20px;
        border-radius: 12px;
        background: #f8f8f8;
        margin-bottom: 25px;
    }
    .avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #eee;
    }
    .info-box {
        flex: 1;
    }
    .info-item {
        font-size: 16px;
        line-height: 1.8;
    }
    .info-item span {
        font-weight: bold;
        color: #000;
        min-width: 80px;
        display: inline-block;
    }
</style>
</head>
<body>

<div class="page-title">人物介绍合集</div>

<!-- 人物1：老婆 -->
<div class="person-card">
    <img src="https://img.cdn1.vip/i/6999f66ebff3a_1771697774.jpg" alt="头像" class="avatar">
    <div class="info-box">
        <div class="info-item"><span>备注：</span>钛风的老婆</div>
        <div class="info-item"><span>快手号：</span>jhx7891jhx</div>
    </div>
</div>
