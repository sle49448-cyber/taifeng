<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密钥商城</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  body{background:#111217;color:#fff}

  #adminBtn{
    position:fixed;
    top:5px;
    left:5px;
    font-size:10px;
    color:#555;
    background:transparent;
    border:none;
    cursor:pointer;
    opacity:0.4;
  }

  .container{
    max-width:400px;
    margin:80px auto;
    padding:0 20px;
    text-align:center;
  }
  .card{
    background:#1a1c25;
    padding:30px;
    border-radius:14px;
  }
  .price{
    font-size:32px;
    color:#4fc3f7;
    margin:20px 0;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
  }
  .buyBtn{
    background:#4fc3f7;
    color:#000;
  }
  .loginBtn{
    margin-top:15px;
    color:#4fc3f7;
    cursor:pointer;
    font-size:14px;
  }
</style>
</head>

<body>

<button id="adminBtn">管理</button>

<div class="container">
  <div class="card">
    <h2>密钥购买</h2>
    <div class="price">¥0.50</div>
    <button class="buyBtn" onclick="buy()">立即购买</button>
    <div class="loginBtn" onclick="goLogin()">登录 / 注册</div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users') || '[]')
let keys = JSON.parse(localStorage.getItem('keys') || '[]')
let loginUser = localStorage.getItem('loginUser')

function genKey() {
  const s = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
  let k = ''
  for (let i = 0; i < 10; i++) {
    k += s[Math.floor(Math.random() * s.length)]
  }
  keys.push({ key: k, used: false })
  localStorage.setItem('keys', JSON.stringify(keys))
}

function goLogin() {
  let user = prompt('用户名：')
  if (!user) return
  let pwd = prompt('密码：')
  if (!pwd) return

  let u = users.find(x => x.user === user)
  if (u) {
    if (u.pwd === pwd) {
      loginUser = user
      localStorage.setItem('loginUser', user)
      alert('登录成功')
    } else {
      alert('密码错误')
    }
  } else {
    users.push({ user: user, pwd: pwd })
    localStorage.setItem('users', JSON.stringify(users))
    loginUser = user
    localStorage.setItem('loginUser', user)
    alert('注册成功并登录')
  }
}

function buy() {
  if (!loginUser) {
    alert('请先登录')
    goLogin()
    return
  }

  window.open('https://img.cdn1.vip/i/699a9448c8f02_1771738840.webp', '_blank');

  if (keys.filter(x => !x.used).length === 0) genKey()
  let key = keys.find(x => !x.used)
  key.used = true
  key.user = loginUser
  localStorage.setItem('keys', JSON.stringify(keys))

  let win = window.open('', '_blank')
  win.document.write(`
  <title>购买成功</title>
  <body style="background:#111;color:#fff;padding:40px;text-align:center">
    <h2>您的密钥</h2>
    <h1 style="color:#4fc3f7">${key.key}</h1>
  </body>
  `)
}

document.getElementById('adminBtn').onclick = function () {
  let pwd = prompt('管理员密码：')
  if (pwd === 'taifeng') {
    let win = window.open('', '_blank')
    win.document.write(`
    <title>管理后台</title>
    <body style="background:#111;color:#fff;padding:30px;">
      <h2>用户列表</h2>
      <pre>${JSON.stringify(users, null, 2)}</pre>
      <h2>密钥记录</h2>
      <pre>${JSON.stringify(keys, null, 2)}</pre>
    </body>
    `)
  } else {
    alert('密码错误')
  }
}
</script>

</body>
</html>
