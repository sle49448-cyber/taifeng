<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密钥商城</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
  body{background:#111217;color:#fff}

  /* 极隐蔽管理员入口：左上角小字，不显眼 */
  #admin{
    position:fixed;
    top:6px;
    left:6px;
    font-size:10px;
    color:#444;
    background:transparent;
    border:none;
    cursor:pointer;
    opacity:0.4;
  }

  .container{
    max-width:400px;
    margin:70px auto;
    padding:0 20px;
    text-align:center;
  }
  .card{
    background:#1a1c25;
    padding:30px;
    border-radius:14px;
  }
  .price{
    font-size:32px;
    color:#4fc3f7;
    margin:20px 0;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
  }
  .buy{
    background:#4fc3f7;
    color:#000;
  }
  .loginBtn{
    margin-top:15px;
    color:#4fc3f7;
    cursor:pointer;
    font-size:14px;
  }
</style>
</head>

<body>

<!-- 极隐蔽管理员：左上角，几乎看不见 -->
<button id="admin">管理</button>

<div class="container">
  <div class="card">
    <h2>密钥购买</h2>
    <div class="price">¥0.50</div>
    <button class="buy" onclick="buy()">立即购买</button>
    <div class="loginBtn" onclick="goLogin()">登录 / 注册</div>
  </div>
</div>

<script>
let users = JSON.parse(localStorage.getItem('users') || '[]')
let keys = JSON.parse(localStorage.getItem('keys') || '[]')
let loginUser = localStorage.getItem('loginUser')

// 自动生成密钥
function genKey(){
  const s = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789'
  let k = ''
  for(let i=0;i<10;i++) k += s[Math.floor(Math.random()*s.length)]
  keys.push({key:k, used:false})
  localStorage.setItem('keys', JSON.stringify(keys))
}

// 登录 + 注册（正常可用）
function goLogin(){
  let user = prompt('输入用户名')
  if(!user) return
  let pwd = prompt('输入密码')
  if(!pwd) return

  let u = users.find(x => x.user === user)
  if(u){
    if(u.pwd === pwd){
      loginUser = user
      localStorage.setItem('loginUser', user)
      alert('登录成功')
    }else{
      alert('密码错误')
    }
  }else{
    // 自动注册
    users.push({user:user, pwd:pwd})
    localStorage.setItem('users', JSON.stringify(users))
    loginUser = user
    localStorage.setItem('loginUser', user)
    alert('注册并登录成功')
  }
}

// 购买逻辑
function buy(){
  if(!loginUser){
    alert('请先登录')
    goLogin()
    return
  }

  // 打开收款码
  window.open('https://img.cdn1.vip/i/699a9448c8f02_1771738840.webp')

  if(keys.filter(x=>!x.used).length === 0) genKey()
  let key = keys.find(x=>!x.used)
  key.used = true
  key.user = loginUser
  localStorage.setItem('keys', JSON.stringify(keys))

  // 新开页面显示密钥
  let w = window.open('','key')
  w.document.write(`
  <title>支付成功</title>
  <body style="background:#111;color:#fff;padding:40px;text-align:center">
    <h2>您的密钥</h2>
    <h1 style="color:#4fc3f7">${key.key}</h1>
  </body>
  `)
}

// 管理员
document.getElementById('admin').onclick = function(){
  let p = prompt('管理员密码')
  if(p === 'taifeng'){
    let w = window.open('','admin')
    w.document.write(`
    <title>管理后台</title>
    <body style="background:#111;color:#fff;padding:30px">
      <h3>用户</h3>
      <pre>${JSON.stringify(users,null,2)}</pre>
      <h3>密钥</h3>
      <pre>${JSON.stringify(keys,null,2)}</pre>
    </body>
    `)
  }else{
    alert('密码错误')
  }
}
</script>

</body>
</html>
