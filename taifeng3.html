<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥商城系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }

        body {
            background-color: #111217;
            color: #ffffff;
            padding-bottom: 50px;
        }

        /* 管理员按钮 左上角 隐蔽 */
        #adminButton {
            position: fixed;
            top: 6px;
            left: 6px;
            font-size: 11px;
            color: #666666;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.5;
            z-index: 9999;
        }

        #adminButton:hover {
            opacity: 1;
        }

        .main-container {
            max-width: 420px;
            margin: 0 auto;
            margin-top: 100px;
            padding-left: 20px;
            padding-right: 20px;
        }

        .shop-card {
            background-color: #1a1c25;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }

        .shop-title {
            font-size: 24px;
            margin-bottom: 12px;
            color: #ffffff;
        }

        .price-text {
            font-size: 36px;
            font-weight: bold;
            color: #4fc3f7;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .buy-button {
            width: 100%;
            height: 50px;
            font-size: 16px;
            font-weight: bold;
            background-color: #4fc3f7;
            color: #000000;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .buy-button:hover {
            background-color: #3daadc;
        }

        .login-area {
            margin-top: 20px;
        }

        .login-text {
            color: #4fc3f7;
            font-size: 15px;
            cursor: pointer;
        }

        .login-text:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- 管理员入口 左上角 -->
<button id="adminButton">管理入口</button>

<div class="main-container">
    <div class="shop-card">
        <h1 class="shop-title">密钥商城</h1>
        <p>支付后自动发放密钥</p>
        <div class="price-text">¥ 0.50</div>
        <button class="buy-button" onclick="buyAction()">立即购买</button>
        <div class="login-area">
            <span class="login-text" onclick="openLoginPanel()">登录 / 注册</span>
        </div>
    </div>
</div>

<script>
// ======================================================
// 全局数据
// ======================================================
let userList = JSON.parse(localStorage.getItem('userList') || '[]');
let keyList  = JSON.parse(localStorage.getItem('keyList')  || '[]');
let currentLoginUser = localStorage.getItem('currentLoginUser');

// ======================================================
// 自动生成密钥函数
// ======================================================
function generateNewKey() {
    let chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let resultKey = '';
    for (let i = 0; i < 10; i++) {
        let randomIndex = Math.floor(Math.random() * chars.length);
        resultKey += chars.charAt(randomIndex);
    }
    let keyObj = {
        key: resultKey,
        used: false,
        usedBy: ''
    };
    keyList.push(keyObj);
    localStorage.setItem('keyList', JSON.stringify(keyList));
}

// ======================================================
// 登录注册
// ======================================================
function openLoginPanel() {
    let username = prompt("请输入用户名：");
    if (!username) {
        return;
    }
    let password = prompt("请输入密码：");
    if (!password) {
        return;
    }

    let userExist = false;
    let targetUser = null;

    for (let i = 0; i < userList.length; i++) {
        if (userList[i].username === username) {
            userExist = true;
            targetUser = userList[i];
            break;
        }
    }

    if (userExist) {
        if (targetUser.password === password) {
            currentLoginUser = username;
            localStorage.setItem('currentLoginUser', username);
            alert("登录成功！");
        } else {
            alert("密码错误！");
        }
    } else {
        let newUser = {
            username: username,
            password: password
        };
        userList.push(newUser);
        localStorage.setItem('userList', JSON.stringify(userList));
        currentLoginUser = username;
        localStorage.setItem('currentLoginUser', username);
        alert("注册成功，已自动登录！");
    }
}

// ======================================================
// 购买动作
// ======================================================
function buyAction() {
    if (!currentLoginUser) {
        alert("请先登录再购买！");
        openLoginPanel();
        return;
    }

    // 打开收款码
    window.open('https://img.cdn1.vip/i/699a9448c8f02_1771738840.webp', '_blank');

    // 保证库存
    let availableKeys = keyList.filter(item => item.used === false);
    if (availableKeys.length <= 0) {
        generateNewKey();
    }

    // 取出一个密钥
    let targetKeyObj = null;
    for (let i = 0; i < keyList.length; i++) {
        if (keyList[i].used === false) {
            targetKeyObj = keyList[i];
            break;
        }
    }

    // 标记已使用
    targetKeyObj.used = true;
    targetKeyObj.usedBy = currentLoginUser;
    localStorage.setItem('keyList', JSON.stringify(keyList));

    // 打开密钥页面
    let keyWindow = window.open('', '_blank');
    keyWindow.document.write(`
    <!DOCTYPE html>
    <html>
    <head>
        <meta charset="UTF-8">
        <title>购买成功</title>
        <style>
            body{background:#111217;color:#fff;padding:50px;text-align:center;font-family:Arial}
            h1{color:#4fc3f7}
        </style>
    </head>
    <body>
        <h2>支付成功</h2>
        <h3>您的密钥：</h3>
        <h1>${targetKeyObj.key}</h1>
        <p>请妥善保管，不要泄露他人</p>
    </body>
    </html>
    `);
}

// ======================================================
// 管理员功能
// ======================================================
document.getElementById('adminButton').onclick = function() {
    let inputPwd = prompt("请输入管理员密码：");
    if (inputPwd === "taifeng") {
        let adminWin = window.open('', '_blank');
        adminWin.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <meta charset="UTF-8">
            <title>管理后台</title>
            <style>
                body{background:#111;color:#fff;padding:30px;font-family:Arial}
                pre{background:#1a1c25;padding:15px;border-radius:8px}
            </style>
        </head>
        <body>
            <h2>用户列表</h2>
            <pre>${JSON.stringify(userList, null, 2)}</pre>
            <br>
            <h2>密钥记录</h2>
            <pre>${JSON.stringify(keyList, null, 2)}</pre>
        </body>
        </html>
        `);
    } else {
        alert("密码错误！");
    }
}
</script>

</body>
</html>
