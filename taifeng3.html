<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>密钥商城</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
  body{background:#111217;color:#fff;padding:20px;}

  /* 左上角管理员 */
  #adminBtn{
    position: fixed;
    top:10px;
    left:10px;
    padding:6px 12px;
    background:#222;
    color:#fff;
    border:1px solid #666;
    border-radius:6px;
    cursor:pointer;
  }

  .container{
    max-width:400px;
    margin:80px auto;
    text-align:center;
  }
  .box{
    background:#1a1c25;
    padding:30px;
    border-radius:14px;
  }
  .price{
    font-size:32px;
    color:#4fc3f7;
    margin:20px 0;
  }
  button{
    width:100%;
    padding:14px;
    font-size:16px;
    font-weight:bold;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
  }
  .buy{
    background:#4fc3f7;
    color:#000;
  }
</style>
</head>

<body>

<button id="adminBtn">管理员</button>

<div class="container">
  <div class="box">
    <h2>密钥购买</h2>
    <div class="price">¥0.50</div>
    <button class="buy" onclick="buyNow()">立即购买</button>
  </div>
</div>

<script>
// 本地数据
let keys = JSON.parse(localStorage.getItem('keys') || '[]');

// 自动生成密钥（永远不会库存不足）
function autoGenKey(){
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
  let key = '';
  for(let i=0;i<10;i++){
    key += chars[Math.floor(Math.random()*chars.length)];
  }
  keys.push({key:key, used:false});
  localStorage.setItem('keys', JSON.stringify(keys));
}

// 购买
function buyNow(){
  // 打开收款码新页面
  window.open('https://img.cdn1.vip/i/699a9448c8f02_1771738840.webp');
  
  // 保证有密钥
  if(keys.length === 0) autoGenKey();
  let find = keys.find(k=>!k.used);
  if(!find){
    autoGenKey();
    find = keys.find(k=>!k.used);
  }
  
  find.used = true;
  localStorage.setItem('keys', JSON.stringify(keys));
  alert('购买成功！密钥：' + find.key);
}

// 管理员登录
document.getElementById('adminBtn').onclick = function(){
  let pwd = prompt('请输入管理员密码：');
  if(pwd === 'taifeng'){
    // 打开新管理页面
    window.open('','admin').document.write(`
      <title>管理后台</title>
      <body style="background:#111;color:#fff;padding:30px;">
        <h1>管理后台</h1>
        <h3>密钥列表</h3>
        <pre>${JSON.stringify(keys,null,2)}</pre>
      </body>
    `);
  }else{
    alert('密码错误');
  }
}
</script>

</body>
</html>
