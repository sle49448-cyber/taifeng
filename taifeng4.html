<div style="width:100%;max-width:600px;margin:20px auto;text-align:center">
  <h3>手机触屏打砖块</h3>    
<title>打方块</title>
  <!-- 放大后的游戏画布 -->
  <canvas id="gameCanvas" width="600" height="450" style="background:#111;border:2px solid #666;border-radius:12px; width:100%;"></canvas>
  <div style="margin-top:15px">
    <button onclick="resetGame()" style="padding:12px 24px;font-size:18px;border:none;border-radius:10px;background:#7E22CE;color:white;cursor:pointer">重新开始</button>
  </div>
  <p style="color:#666;font-size:14px">触摸左右滑动控制挡板</p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let ball, paddle, started, score, bricks;

function initGame() {
  // 按比例放大球和挡板
  ball = { x: 300, y: 225, dx: 2.5, dy: -2.5, radius: 8 };
  paddle = { w: 120, h: 15, x: 240 };
  started = false;
  score = 0;

  bricks = [];
  let brickRowCount = 5;
  let brickColCount = 10; // 增加列数，适配更大画布
  for (let c = 0; c < brickColCount; c++) {
    bricks[c] = [];
    for (let r = 0; r < brickRowCount; r++) {
      bricks[c][r] = { x: 0, y: 0, alive: 1 };
    }
  }
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.closePath();
}

function drawPaddle() {
  ctx.beginPath();
  ctx.rect(paddle.x, canvas.height - paddle.h, paddle.w, paddle.h);
  ctx.fillStyle = '#7E22CE';
  ctx.fill();
  ctx.closePath();
}

function drawBricks() {
  let brickW = 50;
  let brickH = 20;
  let brickPadding = 3;
  let brickOffsetTop = 40;
  let brickOffsetLeft = 15;

  for (let c = 0; c < bricks.length; c++) {
    for (let r = 0; r < bricks[c].length; r++) {
      let b = bricks[c][r];
      if (b.alive) {
        let brickX = c * (brickW + brickPadding) + brickOffsetLeft;
        let brickY = r * (brickH + brickPadding) + brickOffsetTop;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickW, brickH);
        ctx.fillStyle = '#ea4335';
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function collisionDetection() {
  let brickW = 50;
  let brickH = 20;
  let brickPadding = 3;
  let brickOffsetTop = 40;
  let brickOffsetLeft = 15;

  for (let c = 0; c < bricks.length; c++) {
    for (let r = 0; r < bricks[c].length; r++) {
      let b = bricks[c][r];
      if (b.alive) {
        let brickX = c * (brickW + brickPadding) + brickOffsetLeft;
        let brickY = r * (brickH + brickPadding) + brickOffsetTop;
        if (ball.x > brickX && ball.x < brickX + brickW &&
            ball.y > brickY && ball.y < brickY + brickH) {
          ball.dy = -ball.dy;
          b.alive = 0;
          score++;
        }
      }
    }
  }
}

function drawScore() {
  ctx.font = '18px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('分数: ' + score, 12, 30);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBricks();
  drawBall();
  drawPaddle();
  drawScore();
  collisionDetection();

  if (ball.x + ball.dx < ball.radius || ball.x + ball.dx > canvas.width - ball.radius) {
    ball.dx = -ball.dx;
  }
  if (ball.y + ball.dy < ball.radius) {
    ball.dy = -ball.dy;
  } 
  else if (ball.y + ball.dy > canvas.height - paddle.h - ball.radius) {
    if (ball.x + ball.radius > paddle.x && ball.x - ball.radius < paddle.x + paddle.w) {
      ball.dy = -ball.dy;
    } else {
      alert('游戏结束！得分：' + score);
      initGame();
    }
  }

  if (started) {
    ball.x += ball.dx;
    ball.y += ball.dy;
  }

  requestAnimationFrame(draw);
}

canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  let rect = canvas.getBoundingClientRect();
  let touchX = e.touches[0].clientX - rect.left;
  paddle.x = touchX - paddle.w / 2;
  if (paddle.x < 0) paddle.x = 0;
  if (paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;
  if (!started) started = true;
});

function resetGame() {
  initGame();
}

initGame();
draw();
</script>
