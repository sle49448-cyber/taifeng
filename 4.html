<div style="width:100%;max-width:400px;margin:20px auto;text-align:center">
  <h3>手机触屏打砖块</h3>
  <canvas id="gameCanvas" width="400" height="300" style="background:#111;border:2px solid #666;border-radius:8px"></canvas>
  <p style="color:#666;font-size:12px">触摸左右滑动控制挡板</p>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let ball = { x: 200, y: 150, dx: 2.5, dy: -2.5, radius: 4 };
let paddle = { w: 70, h: 10, x: 165, speed: 0 };
let started = false;

let bricks = [];
let brickRowCount = 5;
let brickColCount = 8;
let brickW = 45;
let brickH = 15;
let brickPadding = 2;
let brickOffsetTop = 30;
let brickOffsetLeft = 10;

for(let c=0; c<brickColCount; c++){
  bricks[c] = [];
  for(let r=0; r<brickRowCount; r++){
    bricks[c][r] = { x: 0, y: 0, alive: 1 };
  }
}

let score = 0;

function drawBall(){
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.closePath();
}

function drawPaddle(){
  ctx.beginPath();
  ctx.rect(paddle.x, canvas.height-paddle.h, paddle.w, paddle.h);
  ctx.fillStyle = '#4285f4';
  ctx.fill();
  ctx.closePath();
}

function drawBricks(){
  for(let c=0; c<brickColCount; c++){
    for(let r=0; r<brickRowCount; r++){
      if(bricks[c][r].alive){
        let brickX = c*(brickW+brickPadding) + brickOffsetLeft;
        let brickY = r*(brickH+brickPadding) + brickOffsetTop;
        bricks[c][r].x = brickX;
        bricks[c][r].y = brickY;
        ctx.beginPath();
        ctx.rect(brickX, brickY, brickW, brickH);
        ctx.fillStyle = '#ea4335';
        ctx.fill();
        ctx.closePath();
      }
    }
  }
}

function collisionDetection(){
  for(let c=0; c<brickColCount; c++){
    for(let r=0; r<brickRowCount; r++){
      let b = bricks[c][r];
      if(b.alive){
        if(ball.x > b.x && ball.x < b.x+brickW && ball.y > b.y && ball.y < b.y+brickH){
          ball.dy = -ball.dy;
          b.alive = 0;
          score++;
          if(score == brickRowCount*brickColCount){
            alert('恭喜通关！得分：'+score);
            document.location.reload();
          }
        }
      }
    }
  }
}

function drawScore(){
  ctx.font = '14px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText('分数: '+score, 8, 20);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawBricks();
  drawBall();
  drawPaddle();
  drawScore();
  collisionDetection();

  if(ball.x + ball.dx < ball.radius || ball.x + ball.dx > canvas.width-ball.radius){
    ball.dx = -ball.dx;
  }
  if(ball.y + ball.dy < ball.radius){
    ball.dy = -ball.dy;
  } else if(ball.y + ball.dy > canvas.height-ball.radius-ball.h){
    if(ball.x > paddle.x && ball.x < paddle.x + paddle.w){
      ball.dy = -ball.dy;
    }else{
      alert('游戏结束！得分：'+score);
      document.location.reload();
    }
  }

  if(started){
    ball.x += ball.dx;
    ball.y += ball.dy;
  }

  requestAnimationFrame(draw);
}

// 手机触摸控制
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  let rect = canvas.getBoundingClientRect();
  let touchX = e.touches[0].clientX - rect.left;
  paddle.x = touchX - paddle.w / 2;
  if(paddle.x < 0) paddle.x = 0;
  if(paddle.x + paddle.w > canvas.width) paddle.x = canvas.width - paddle.w;
  if(!started) started = true;
});

draw();
</script>
