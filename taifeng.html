<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Microsoft YaHei", sans-serif;
  }
  body {
    background: #ffffff;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }
  .title {
    font-size: 24px;
    font-weight: bold;
    text-align: center;
    margin-bottom: 40px;
    color: #222;
  }
  .btn-box {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .item-btn {
    padding: 20px;
    font-size: 18px;
    font-weight: bold;
    border: none;
    border-radius: 14px;
    background: #6200ea;
    color: white;
    cursor: pointer;
    transition: 0.2s;
  }
  .item-btn:hover {
    opacity: 0.9;
    transform: translateY(-2px);
  }
</style>
</head>
